<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>伙食订餐系统 - 后台管理</title>
  <link rel="stylesheet" href="admin-styles.css">
</head>
<body>
  <div class="admin-container">
    <div class="sidebar">
      <div class="logo">
        <h1>🍽️ 订餐系统</h1>
        <p>后台管理</p>
      </div>
      
      <nav class="nav-menu">
        <a href="#" class="nav-item active" data-filter="all">
          <span class="icon">📋</span>
          <span>所有订单</span>
        </a>
        <a href="#" class="nav-item" data-filter="pending">
          <span class="icon">⏳</span>
          <span>待处理</span>
        </a>
        <a href="#" class="nav-item" data-filter="completed">
          <span class="icon">✅</span>
          <span>已完成</span>
        </a>
      </nav>
      
      <div class="sidebar-footer">
        <a href="/" class="btn-back">← 返回客户端</a>
      </div>
    </div>

    <div class="main-content">
      <div class="header">
        <h2>📊 订单管理</h2>
        <div class="header-actions">
          <input type="date" id="filterDate" class="filter-date">
          <button id="refreshBtn" class="btn-refresh">🔄 刷新</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-icon">📦</div>
          <div class="stat-info">
            <div class="stat-label">总订单</div>
            <div class="stat-value" id="totalOrders">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">⏳</div>
          <div class="stat-info">
            <div class="stat-label">待处理</div>
            <div class="stat-value" id="pendingOrders">0</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">✅</div>
          <div class="stat-info">
            <div class="stat-label">已完成</div>
            <div class="stat-value" id="completedOrders">0</div>
          </div>
        </div>
      </div>

      <div class="orders-section">
        <div id="ordersList" class="orders-list">
          <p class="loading">加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
