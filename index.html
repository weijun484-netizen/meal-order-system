<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伙食订单</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

.app { max-width: 480px; margin: 0 auto; background: #fff; min-height: 100vh; display: flex; flex-direction: column; }

.header { padding: 20px 20px 0; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.header-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.header-sub { font-size: 13px; color: #888; margin-bottom: 16px; }
.cart-badge { background: #1a1a1a; color: #fff; font-size: 12px; padding: 5px 12px; border-radius: 99px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; }
.cart-badge:active { opacity: 0.7; }

.tabs { display: flex; padding: 0 20px; border-bottom: 1px solid #f0f0f0; gap: 0; }
.tab { padding: 12px 16px; font-size: 14px; color: #999; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; flex: 1; text-align: center; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 600; }

.section { display: none; flex: 1; overflow-y: auto; }
.section.active { display: block; }

.cat-scroll { display: flex; gap: 8px; padding: 14px 20px; overflow-x: auto; scrollbar-width: none; }
.cat-scroll::-webkit-scrollbar { display: none; }
.cat-btn { padding: 6px 16px; font-size: 13px; border-radius: 99px; border: 1.5px solid #e8e8e8; background: #fff; color: #666; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.cat-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

.menu-list { padding: 0 20px 20px; display: flex; flex-direction: column; gap: 8px; }
.menu-item { display: flex; align-items: center; padding: 14px; background: #fafafa; border-radius: 14px; gap: 14px; cursor: pointer; transition: background 0.15s; }
.menu-item:active { background: #f0f0f0; }
.item-emoji { font-size: 32px; width: 44px; text-align: center; flex-shrink: 0; }
.item-info { flex: 1; }
.item-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.item-meta { font-size: 12px; color: #aaa; }
.item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
.item-price { font-size: 16px; font-weight: 700; }
.add-btn { width: 30px; height: 30px; border-radius: 50%; background: #1a1a1a; color: #fff; border: none; font-size: 20px; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
.add-btn:active { transform: scale(0.88); }
.in-cart-ctrl { display: flex; align-items: center; gap: 6px; }
.qty-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #e0e0e0; background: #fff; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #1a1a1a; transition: all 0.1s; }
.qty-btn:active { background: #f0f0f0; }
.qty-num { font-size: 15px; font-weight: 700; min-width: 18px; text-align: center; }

/* Cart */
.cart-section { padding: 16px 20px 100px; }
.cart-empty-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: #ccc; }
.cart-empty-icon { font-size: 52px; }
.cart-empty-txt { font-size: 15px; }
.cart-items { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.cart-row { display: flex; align-items: center; gap: 12px; padding: 14px; background: #fafafa; border-radius: 14px; }
.cart-emoji { font-size: 24px; width: 36px; text-align: center; }
.cart-info { flex: 1; }
.cart-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
.cart-unit { font-size: 12px; color: #aaa; }
.cart-ctrl { display: flex; align-items: center; gap: 8px; }
.cart-qty { font-size: 15px; font-weight: 700; min-width: 20px; text-align: center; }

.order-summary { background: #fafafa; border-radius: 16px; padding: 16px; margin-bottom: 16px; }
.summary-row { display: flex; justify-content: space-between; font-size: 13px; color: #888; margin-bottom: 6px; }
.summary-row:last-child { margin-bottom: 0; }
.summary-total { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid #ebebeb; margin-top: 6px; }
.total-label { font-size: 15px; font-weight: 600; }
.total-amount { font-size: 22px; font-weight: 800; }

.order-btn { width: 100%; padding: 15px; background: #1a1a1a; color: #fff; border: none; border-radius: 14px; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity 0.15s; }
.order-btn:active { opacity: 0.8; }
.clear-row { display: flex; justify-content: flex-end; margin-bottom: 12px; }
.clear-btn { font-size: 13px; color: #e04040; background: none; border: none; cursor: pointer; padding: 4px 0; }

/* History */
.history-section { padding: 16px 20px 30px; }
.hist-empty { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; gap: 10px; color: #ccc; font-size: 15px; }
.hist-list { display: flex; flex-direction: column; gap: 10px; }
.hist-card { background: #fafafa; border-radius: 14px; padding: 14px 16px; }
.hist-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.hist-id { font-size: 13px; font-weight: 700; }
.hist-time { font-size: 12px; color: #aaa; }
.hist-items-txt { font-size: 13px; color: #666; margin-bottom: 10px; line-height: 1.6; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hist-bottom { display: flex; justify-content: space-between; align-items: center; }
.status-pill { font-size: 11px; padding: 4px 10px; border-radius: 99px; font-weight: 600; }
.s-done { background: #e6f9f0; color: #1a8a5a; }
.s-pending { background: #fff4e0; color: #c07800; }
.hist-amount { font-size: 15px; font-weight: 800; }

/* Toast */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 99px; font-size: 14px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-title">🍱 伙食订单</div>
      <div class="cart-badge" id="cartBadge" onclick="switchTab('cart',1)">购物车 (0)</div>
    </div>
    <div class="header-sub">今日供餐 · 周一至周五</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('menu',0)">菜单</div>
    <div class="tab" onclick="switchTab('cart',1)">我的订单</div>
    <div class="tab" onclick="switchTab('history',2)">历史</div>
  </div>

  <!-- 菜单 -->
  <div id="sec-menu" class="section active">
    <div class="cat-scroll" id="catRow"></div>
    <div class="menu-list" id="menuList"></div>
  </div>

  <!-- 购物车 -->
  <div id="sec-cart" class="section">
    <div class="cart-section" id="cartSection"></div>
  </div>

  <!-- 历史 -->
  <div id="sec-history" class="section">
    <div class="history-section" id="histSection"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MENU = [
  { id:1, name:'红烧肉饭', emoji:'🍖', cal:'680kcal', price:18, cat:'荤菜' },
  { id:2, name:'糖醋排骨', emoji:'🍗', cal:'560kcal', price:20, cat:'荤菜' },
  { id:3, name:'宫保鸡丁', emoji:'🍛', cal:'490kcal', price:16, cat:'荤菜' },
  { id:4, name:'清蒸鲈鱼', emoji:'🐟', cal:'320kcal', price:28, cat:'荤菜' },
  { id:5, name:'麻婆豆腐', emoji:'🫕', cal:'380kcal', price:12, cat:'素菜' },
  { id:6, name:'炒时蔬',   emoji:'🥦', cal:'180kcal', price:10, cat:'素菜' },
  { id:7, name:'番茄炒蛋', emoji:'🍳', cal:'290kcal', price:10, cat:'素菜' },
  { id:8, name:'皮蛋豆腐', emoji:'🥗', cal:'220kcal', price:9,  cat:'素菜' },
  { id:9, name:'米饭',     emoji:'🍚', cal:'200kcal', price:3,  cat:'主食' },
  { id:10,name:'馒头',     emoji:'🥮', cal:'220kcal', price:2,  cat:'主食' },
  { id:11,name:'紫菜蛋花汤',emoji:'🍜',cal:'90kcal',  price:6,  cat:'汤品' },
  { id:12,name:'玉米排骨汤',emoji:'🫙',cal:'230kcal', price:10, cat:'汤品' },
];

const CATS = ['全部', ...new Set(MENU.map(i => i.cat))];
let activeCat = '全部';
let cart = {};
let orders = [
  { id:'#202405-001', time:'05-16 12:05', items:'宫保鸡丁、米饭、紫菜蛋花汤', total:34, status:'done' },
  { id:'#202405-002', time:'05-15 11:58', items:'红烧肉饭、炒时蔬', total:28, status:'done' },
];

function cartTotal() {
  return Object.entries(cart).reduce((s,[k,q]) => s + (MENU.find(i=>i.id==k)?.price||0)*q, 0);
}
function cartCount() {
  return Object.values(cart).reduce((a,b)=>a+b,0);
}

function renderCats() {
  document.getElementById('catRow').innerHTML = CATS.map(c =>
    `<button class="cat-btn${c===activeCat?' active':''}" onclick="setCat('${c}')">${c}</button>`
  ).join('');
}

function setCat(c) { activeCat = c; renderCats(); renderMenu(); }

function renderMenu() {
  const list = MENU.filter(i => activeCat==='全部' || i.cat===activeCat);
  document.getElementById('menuList').innerHTML = list.map(item => {
    const qty = cart[item.id] || 0;
    const ctrl = qty > 0
      ? `<div class="in-cart-ctrl">
           <button class="qty-btn" onclick="change(${item.id},-1)">−</button>
           <span class="qty-num">${qty}</span>
           <button class="qty-btn" onclick="change(${item.id},1)">+</button>
         </div>`
      : `<button class="add-btn" onclick="addItem(${item.id})">+</button>`;
    return `<div class="menu-item">
      <div class="item-emoji">${item.emoji}</div>
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-meta">${item.cat} · ${item.cal}</div>
      </div>
      <div class="item-right">
        <div class="item-price">¥${item.price}</div>
        ${ctrl}
      </div>
    </div>`;
  }).join('');
}

function addItem(id) {
  cart[id] = (cart[id]||0) + 1;
  updateBadge(); renderMenu();
  const item = MENU.find(i=>i.id===id);
  showToast(`已加入 ${item.emoji} ${item.name}`);
}

function change(id, d) {
  cart[id] = Math.max(0, (cart[id]||0)+d);
  if (!cart[id]) delete cart[id];
  updateBadge(); renderMenu();
  if (document.getElementById('sec-cart').classList.contains('active')) renderCart();
}

function updateBadge() {
  document.getElementById('cartBadge').textContent = `购物车 (${cartCount()})`;
}

function renderCart() {
  const keys = Object.keys(cart).filter(k=>cart[k]>0);
  const sec = document.getElementById('cartSection');
  if (!keys.length) {
    sec.innerHTML = `<div class="cart-empty-wrap"><div class="cart-empty-icon">🛒</div><div class="cart-empty-txt">购物车是空的，去选菜吧~</div></div>`;
    return;
  }
  const rows = keys.map(k => {
    const item = MENU.find(i=>i.id==k);
    return `<div class="cart-row">
      <div class="cart-emoji">${item.emoji}</div>
      <div class="cart-info">
        <div class="cart-name">${item.name}</div>
        <div class="cart-unit">¥${item.price} / 份</div>
      </div>
      <div class="cart-ctrl">
        <button class="qty-btn" onclick="change(${k},-1)">−</button>
        <span class="cart-qty">${cart[k]}</span>
        <button class="qty-btn" onclick="change(${k},1)">+</button>
      </div>
    </div>`;
  }).join('');

  const sumRows = keys.map(k => {
    const item = MENU.find(i=>i.id==k);
    return `<div class="summary-row"><span>${item.name} × ${cart[k]}</span><span>¥${(item.price*cart[k]).toFixed(2)}</span></div>`;
  }).join('');

  sec.innerHTML = `
    <div class="clear-row"><button class="clear-btn" onclick="clearCart()">清空购物车</button></div>
    <div class="cart-items">${rows}</div>
    <div class="order-summary">
      ${sumRows}
      <div class="summary-total">
        <span class="total-label">合计金额</span>
        <span class="total-amount">¥${cartTotal().toFixed(2)}</span>
      </div>
    </div>
    <button class="order-btn" onclick="placeOrder()">✅ 提交订单</button>
  `;
}

function clearCart() {
  if (!Object.keys(cart).length) return;
  cart = {}; updateBadge(); renderMenu(); renderCart();
  showToast('购物车已清空');
}

function placeOrder() {
  const keys = Object.keys(cart).filter(k=>cart[k]>0);
  if (!keys.length) { showToast('请先选择菜品'); return; }
  const total = cartTotal();
  const itemNames = keys.map(k=>MENU.find(i=>i.id==k).name).join('、');
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const timeStr = `${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const idStr = `#${now.getFullYear()}${pad(now.getMonth()+1)}-${String(orders.length+1).padStart(3,'0')}`;
  orders.unshift({ id:idStr, time:timeStr, items:itemNames, total, status:'pending' });
  cart = {}; updateBadge(); renderMenu();
  showToast('🎉 订单提交成功！');
  switchTab('history', 2);
}

function renderHistory() {
  const sec = document.getElementById('histSection');
  if (!orders.length) {
    sec.innerHTML = `<div class="hist-empty"><div style="font-size:48px">📋</div>暂无历史记录</div>`;
    return;
  }
  sec.innerHTML = `<div class="hist-list">${orders.map(o=>`
    <div class="hist-card">
      <div class="hist-top">
        <span class="hist-id">${o.id}</span>
        <span class="hist-time">${o.time}</span>
      </div>
      <div class="hist-items-txt">${o.items}</div>
      <div class="hist-bottom">
        <span class="status-pill ${o.status==='done'?'s-done':'s-pending'}">${o.status==='done'?'✓ 已完成':'⏳ 备餐中'}</span>
        <span class="hist-amount">¥${Number(o.total).toFixed(2)}</span>
      </div>
    </div>`).join('')}</div>`;
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

function switchTab(name, idx) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', i===idx));
  ['menu','cart','history'].forEach(s=>document.getElementById('sec-'+s).classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  if (name==='cart') renderCart();
  if (name==='history') renderHistory();
}

renderCats();
renderMenu();
</script>
</body>
</html>
